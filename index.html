<!doctype html>
<html lang="en">

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#7A4E3B" />

    <!-- Fallback title and description (overridden per-page by react-helmet-async) -->
    <title>GenMyo — AI-Powered Guided Reflection & Inner Wellness</title>

    <!-- Canonical (overridden per-page) -->
    <link rel="canonical" href="https://www.genmyo.ai/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="GenMyo" />
    <meta property="og:title" content="GenMyo — AI-Powered Guided Reflection & Inner Wellness" />
    <meta property="og:description" content="GenMyo is an AI wellness platform that guides you through daily 2-minute reflections on WhatsApp — no app needed. Build clarity, resilience and better habits, one prompt at a time." />

    <meta property="og:image:alt" content="GenMyo logo" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="GenMyo — AI-Powered Guided Reflection & Inner Wellness" />
    <meta name="twitter:description" content="Daily 2-minute AI-guided reflections on WhatsApp. No app needed." />
    <meta name="twitter:image" content="https://www.genmyo.ai/genmyo-logo.png" />

    <!-- Favicons & logo -->
    <link rel="icon" type="image/x-icon" href="https://www.genmyo.ai/favicon.ico" />
    <link rel="icon" type="image/png" href="https://www.genmyo.ai/favicon.png" />
    <link rel="apple-touch-icon" href="https://www.genmyo.ai/genmyo-logo.png" />

    <!-- Fonts (existing) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="font" type="font/woff2" href="https://fonts.gstatic.com/s/cormorantgaramond/v21/co3bmX5slCNuHLi8bLeY9MK7whWMhyjYqXtK.woff2" crossorigin="anonymous" />

    <!-- JSON-LD: Organisation schema -->

      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "GenMyo",
      "url": "https://www.genmyo.ai",
      "logo": "https://www.genmyo.ai/genmyo-logo.png",

        "https://www.linkedin.com/company/genmyo",
        "https://www.facebook.com/genmyo"
      ]
    }

  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
